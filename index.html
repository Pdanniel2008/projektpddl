<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iskolai Ötletdoboz - Problémamegoldás</title>
    <link rel="stylesheet" href="projekt.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="school-badge">
                <img src="gepesz_alap_5d3a12540c.png" style="background: white; display: flex; align-items: center; justify-content: center; font-size: 40px; height: 500px;">
            </div>
            <h1>iBOX</h1>
            <p class="subtitle">Láttál problémát? Van megoldási ötleted? Oszd meg velünk!</p>
            <div class="motto">"Ne csak panaszkodj, tegyél is érte!"</div>
        </header>

        <div class="idea-box">
            
            <div class="input-section">
                <div class="input-header">
                    <h2>📮 Új ötlet beküldése</h2>
                    <span class="badge">Diákok és Tanárok</span>
                </div>
                
                <form id="ideaForm">
                    
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="category">
                                <span class="label-icon">📌</span>
                                Kategória
                            </label>
                            <select id="category" required style="width: 100%; padding: 10px; margin: 5px 0;">
                                <option value="" disabled selected>-- Válassz kategóriát --</option>
                                <option value="oktatas">📚 Oktatás & Tanulás</option>
                                <option value="kornyezet">🏫 Iskolai környezet</option>
                                <option value="programok">🎪 Programok & Rendezvények</option>
                                <option value="felszereltseg">🖥️ Felszereltség & Eszközök</option>
                                <option value="kozosseg">👥 Közösség & Diákélet</option>
                                <option value="biztonsag">🛡️ Biztonság & Egészség</option>
                                <option value="egyeb">💡 Egyéb</option>
                            </select>
                        </div>
                    </div>

                    
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="problem">
                                <span class="label-icon">⚠️</span>
                                Probléma / Kihívás
                            </label>
                            <textarea 
                                id="problem" 
                                placeholder="Milyen problémát, nehézséget vagy kihívást tapasztaltál az iskolában? Írd le részletesen..."
                                rows="3"
                                required
                                style="width: 100%; padding: 10px; margin: 5px 0;"
                            ></textarea>
                        </div>
                    </div>

                    
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="solution">
                                <span class="label-icon">💡</span>
                                Ötlet / Megoldási javaslat
                            </label>
                            <textarea 
                                id="solution" 
                                placeholder="Mi lenne a megoldás? Hogyan lehetne javítani a helyzeten? Írd le az ötleted..."
                                rows="3"
                                required
                                style="width: 100%; padding: 10px; margin: 5px 0;"
                            ></textarea>
                        </div>
                    </div>

                    
                    <div class="form-row">
                        <div class="form-group full-width">
                            <label for="email">
                                <span class="label-icon">📧</span>
                                Email cím (visszajelzéshez)
                            </label>
                            <input 
                                type="email" 
                                id="email" 
                                placeholder="pelda@iskola.hu"
                                required
                                style="width: 100%; padding: 10px; margin: 5px 0;"
                            >
                            <span class="field-hint">Az ötleted állapotáról emailben értesítünk</span>
                        </div>
                    </div>

                    
                    <div class="form-actions">
                        <button type="submit" id="addIdeaBtn" class="btn-primary">
                            <span class="plus-icon">+</span> 
                            Ötlet beküldése
                        </button>
                        <button type="reset" class="btn-secondary">
                            Űrlap törlése
                        </button>
                    </div>
                </form>
            </div>

            
            <div class="filter-section">
                <div class="filter-tabs">
                    <button class="filter-btn active" data-filter="all">🔍 Minden bejegyzés</button>
                    <button class="filter-btn" data-filter="oktatas">📚 Oktatás</button>
                    <button class="filter-btn" data-filter="kornyezet">🏫 Környezet</button>
                    <button class="filter-btn" data-filter="programok">🎪 Programok</button>
                    <button class="filter-btn" data-filter="felszereltseg">🖥️ Eszközök</button>
                    <button class="filter-btn" data-filter="kozosseg">👥 Közösség</button>
                    <button class="filter-btn" data-filter="biztonsag">🛡️ Biztonság</button>
                    <button class="filter-btn" data-filter="egyeb">💡 Egyéb</button>
                </div>
                
                <div class="stats-container">
                    <div class="stat-item">
                        <span class="stat-label">📊 Beküldött ötletek:</span>
                        <span class="stat-number" id="totalIdeas">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">✅ Megvalósítva:</span>
                        <span class="stat-number" id="completedIdeas">0</span>
                    </div>
                </div>
            </div>

            
            <div class="ideas-grid" id="ideasGrid">
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://your-project.supabase.co'; 
        const SUPABASE_ANON_KEY = 'your-anon-key';           
        
        let supabase;
        let ideas = [];
        let currentFilter = 'all';

        const ideasGrid = document.getElementById('ideasGrid');
        const totalIdeasSpan = document.getElementById('totalIdeas');
        const completedIdeasSpan = document.getElementById('completedIdeas');
        const filterButtons = document.querySelectorAll('.filter-btn');
        const submitBtn = document.getElementById('addIdeaBtn');

      
        function isSupabaseConfigured() {
            if (SUPABASE_URL === 'https://your-project.supabase.co' || SUPABASE_ANON_KEY === 'your-anon-key') {
                ideasGrid.innerHTML = `<div class="empty-state">
                    ⚠️ <strong>Supabase konfiguráció szükséges</strong><br><br>
                    A gombok működéséhez be kell állítanod a Supabase kapcsolatot!<br><br>
                    📝 <strong>Beállítási útmutató:</strong><br>
                    1. Regisztrálj a <a href="https://supabase.com" target="_blank">supabase.com</a> oldalon<br>
                    2. Hozz létre egy új projektet<br>
                    3. A project settings / API oldalon másold ki a "Project URL" és "anon public" kulcsot<br>
                    4. Cseréld le a fenti SUPABASE_URL és SUPABASE_ANON_KEY változók értékeit<br>
                    5. Hozd létre az 'ideas' táblát az alábbi oszlopokkal:<br>
                    &nbsp;&nbsp;&nbsp;- id (int8, primary key, auto increment)<br>
                    &nbsp;&nbsp;&nbsp;- created_at (timestamp with time zone, default now())<br>
                    &nbsp;&nbsp;&nbsp;- category (text)<br>
                    &nbsp;&nbsp;&nbsp;- problem (text)<br>
                    &nbsp;&nbsp;&nbsp;- solution (text)<br>
                    &nbsp;&nbsp;&nbsp;- email (text)<br>
                    &nbsp;&nbsp;&nbsp;- completed (boolean, default false)<br>
                    6. Engedélyezd a Row Level Security-t, és adj hozzá insert/select/update/delete politikákat<br><br>
                    💡 <strong>Próba verzió:</strong> Ha csak tesztelni szeretnéd, a böngésző lokális tárhelyét is használhatod -<br>
                    &nbsp;&nbsp;&nbsp;Töltsd újra az oldalt és kattints a "Próba mód" gombra!
                </div>
                <button id="demoModeBtn" style="margin-top: 20px; padding: 12px 24px; background: #667eea; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px;">🎮 Próba mód (lokális tárolás)</button>
                </div>`;
                
                const demoBtn = document.getElementById('demoModeBtn');
                if (demoBtn) {
                    demoBtn.onclick = () => {
                        enableDemoMode();
                    };
                }
                return false;
            }
            
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                return true;
            } catch(e) {
                console.error('Supabase init error:', e);
                return false;
            }
        }


        function enableDemoMode() {

            supabase = {
                from: (table) => {
                    const STORAGE_KEY = 'ibox_demo_ideas';
                    
                    const getIdeas = () => {
                        const stored = localStorage.getItem(STORAGE_KEY);
                        if (stored) {
                            return JSON.parse(stored);
                        }

                        const sampleIdeas = [
                            {
                                id: 1,
                                created_at: new Date().toISOString(),
                                category: 'oktatas',
                                problem: 'Az informatika teremben régi számítógépek vannak, amelyek lassan működnek.',
                                solution: 'Új számítógépek beszerzése vagy a meglévők frissítése SSD-vel és memóriával.',
                                email: 'tanulo@iskola.hu',
                                completed: false
                            },
                            {
                                id: 2,
                                created_at: new Date(Date.now() - 86400000).toISOString(),
                                category: 'kornyezet',
                                problem: 'Az iskola udvarán nincs elég szemetes, sok helyen eldobált szemét van.',
                                solution: 'Több szemetes kihelyezése és szelektív gyűjtők elhelyezése.',
                                email: 'kornyezetvedo@iskola.hu',
                                completed: true
                            }
                        ];
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(sampleIdeas));
                        return sampleIdeas;
                    };
                    
                    return {
                        select: () => ({
                            order: (column, options) => ({
                                then: (callback) => {
                                    let data = getIdeas();
                                    data = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                                    callback({ data, error: null });
                                    return { data, error: null };
                                }
                            }),
                            eq: (field, value) => ({
                                then: (callback) => {
                                    let data = getIdeas();
                                    data = data.filter(item => item[field] === value);
                                    data = data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                                    callback({ data, error: null });
                                    return { data, error: null };
                                }
                            })
                        }),
                        insert: (newIdeas) => ({
                            select: () => ({
                                then: (callback) => {
                                    const ideas = getIdeas();
                                    const newId = Math.max(...ideas.map(i => i.id), 0) + 1;
                                    const newIdea = { ...newIdeas[0], id: newId, created_at: new Date().toISOString() };
                                    ideas.push(newIdea);
                                    localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
                                    callback({ data: [newIdea], error: null });
                                    return { data: [newIdea], error: null };
                                }
                            })
                        }),
                        update: (updates) => ({
                            eq: (field, value) => ({
                                then: (callback) => {
                                    const ideas = getIdeas();
                                    const index = ideas.findIndex(item => item[field] === value);
                                    if (index !== -1) {
                                        ideas[index] = { ...ideas[index], ...updates };
                                        localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
                                    }
                                    callback({ data: ideas[index], error: null });
                                    return { data: ideas[index], error: null };
                                }
                            })
                        }),
                        delete: () => ({
                            eq: (field, value) => ({
                                then: (callback) => {
                                    let ideas = getIdeas();
                                    ideas = ideas.filter(item => item[field] !== value);
                                    localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));
                                    callback({ data: null, error: null });
                                    return { data: null, error: null };
                                }
                            })
                        })
                    };
                }
            };
            
            alert('Próba mód aktiválva! Az adatok a böngészőben lesznek tárolva.');
            loadIdeas();
            

            const gridContent = document.getElementById('ideasGrid');
            if (gridContent) {
                loadIdeas();
            }
        }

        async function loadIdeas() {
            if (!supabase) {
                isSupabaseConfigured();
                return;
            }
            
            try {
                let query = supabase
                    .from('ideas')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (currentFilter !== 'all') {
                    query = query.eq('category', currentFilter);
                }
                
                const { data, error } = await query;
                
                if (error) throw error;
                
                ideas = data || [];
                renderIdeas();
            } catch (error) {
                console.error('Hiba a betöltéskor:', error);
                ideasGrid.innerHTML = `<div class="empty-state">❌ Hiba: ${error.message}<br><br>Ellenőrizd a Supabase konfigurációt és a tábla létrehozását!</div>`;
            }
        }

        function updateStats() {
            totalIdeasSpan.textContent = ideas.length;
            const completedCount = ideas.filter(idea => idea.completed).length;
            completedIdeasSpan.textContent = completedCount;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderIdea(idea) {
            const categoryNames = {
                'oktatas': '📚 Oktatás',
                'kornyezet': '🏫 Környezet',
                'programok': '🎪 Programok',
                'felszereltseg': '🖥️ Eszközök',
                'kozosseg': '👥 Közösség',
                'biztonsag': '🛡️ Biztonság',
                'egyeb': '💡 Egyéb'
            };

            const card = document.createElement('div');
            card.className = `idea-card ${idea.completed ? 'completed' : ''}`;
            card.dataset.id = idea.id;
            card.dataset.category = idea.category;

            const date = new Date(idea.created_at).toLocaleDateString('hu-HU', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });

            card.innerHTML = `
                <div class="idea-header">
                    <span class="category-badge">${categoryNames[idea.category] || idea.category}</span>
                    <span class="email-badge">✉️ ${escapeHtml(idea.email)}</span>
                </div>
                <div class="problem-section">
                    <div class="problem-label"><span>⚠️ PROBLÉMA</span></div>
                    <div class="problem-text">${escapeHtml(idea.problem)}</div>
                </div>
                <div class="solution-section">
                    <div class="solution-label"><span>💡 MEGOLDÁS</span></div>
                    <div class="solution-text">${escapeHtml(idea.solution)}</div>
                </div>
                <div class="idea-footer">
                    <div class="idea-date">📅 ${date}</div>
                    <div class="idea-actions">
                        <button class="complete-btn" onclick="window.toggleComplete(${idea.id})" title="Megvalósítva">
                            ${idea.completed ? '✅' : '◻️'}
                        </button>
                        <button class="delete-btn" onclick="window.deleteIdea(${idea.id})" title="Törlés">
                            🗑️
                        </button>
                    </div>
                </div>
            `;
            return card;
        }

        function renderIdeas() {
            ideasGrid.innerHTML = '';
            if (ideas.length === 0) {
                ideasGrid.innerHTML = `<div class="empty-state">📭 Még nincsenek ötletek. Légy az első!</div>`;
            } else {
                ideas.forEach(idea => ideasGrid.appendChild(renderIdea(idea)));
            }
            updateStats();
        }

        async function addIdea(e) {
            e.preventDefault();
            
            const category = document.getElementById('category').value;
            const problem = document.getElementById('problem').value.trim();
            const solution = document.getElementById('solution').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!category || !problem || !solution || !email) {
                alert('Kérlek tölts ki minden mezőt!');
                return;
            }

            if (!supabase) {
                alert('A Supabase nincs konfigurálva! Használd a "Próba mód" gombot a teszteléshez.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Küldés folyamatban...';

            try {
                const { data, error } = await supabase
                    .from('ideas')
                    .insert([
                        { 
                            category, 
                            problem, 
                            solution, 
                            email,
                            completed: false
                        }
                    ])
                    .select();
                
                if (error) throw error;
                
                alert('Ötlet sikeresen beküldve!');
                document.getElementById('ideaForm').reset();
                document.getElementById('category').value = '';
                await loadIdeas();
                
            } catch (error) {
                console.error('Hiba a beküldéskor:', error);
                alert('Nem sikerült beküldeni az ötletet: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '+ Ötlet beküldése';
            }
        }

        window.toggleComplete = async function(id) {
            if (!supabase) return;
            const idea = ideas.find(i => i.id === id);
            if (!idea) return;
            
            try {
                const { error } = await supabase
                    .from('ideas')
                    .update({ completed: !idea.completed })
                    .eq('id', id);
                
                if (error) throw error;
                
                await loadIdeas();
            } catch (error) {
                console.error('Hiba:', error);
                alert('Nem sikerült módosítani az állapotot: ' + error.message);
            }
        };

        window.deleteIdea = async function(id) {
            if (!supabase) return;
            if (confirm('Biztosan törlöd ezt az ötletet?')) {
                try {
                    const { error } = await supabase
                        .from('ideas')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    await loadIdeas();
                    alert('Ötlet sikeresen törölve');
                } catch (error) {
                    console.error('Hiba:', error);
                    alert('Nem sikerült törölni az ötletet: ' + error.message);
                }
            }
        };

        function setFilter(filter) {
            currentFilter = filter;
            filterButtons.forEach(btn => {
                if (btn.dataset.filter === filter) {
                    btn.classList.add('active');
                    btn.style.background = '#4CAF50';
                    btn.style.color = 'white';
                } else {
                    btn.classList.remove('active');
                    btn.style.background = '#f0f0f0';
                    btn.style.color = '#333';
                }
            });
            loadIdeas();
        }


        const form = document.getElementById('ideaForm');
        if (form) {
            form.addEventListener('submit', addIdea);
        }
        
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => setFilter(btn.dataset.filter));
        });
        
        const resetBtn = document.querySelector('.btn-secondary');
        if (resetBtn) {
            resetBtn.addEventListener('click', (e) => {
                e.preventDefault();
                document.getElementById('ideaForm').reset();
                document.getElementById('category').value = '';
            });
        }


        if (!isSupabaseConfigured()) {

            console.log('Supabase nincs konfigurálva, próba mód ajánlása');
        } else {
            loadIdeas();
        }
    </script>
</body>
</html>
